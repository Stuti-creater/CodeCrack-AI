<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Company Sheet</title>
    <link rel="stylesheet"
      th:href="@{/css/themes.css}">

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            padding:40px;
        }

        .card{
            background:#1e293b;
            padding:20px;
            margin-bottom:15px;
            border-radius:15px;
        }

        a{
            color:#60a5fa;
            text-decoration:none;
            font-size:20px;
        }
    </style>
</head>

<body id="theme-body">

<h1 th:text="${company} + ' Sheet'"></h1>

<div th:each="entry : ${questions}"
     class="card">

    <a th:href="@{/question(name=${entry.key})}"
       th:text="${entry.key}">
    </a>

    <p th:text="${entry.value.difficulty}">
    </p>

</div>
<script th:src="@{/js/theme.js}">
</script>
</body>
</html>
