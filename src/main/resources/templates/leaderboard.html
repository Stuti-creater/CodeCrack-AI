<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Leaderboard</title>

<link rel="stylesheet"
      href="/css/leaderboard.css">
      <link rel="stylesheet"
      th:href="@{/css/themes.css}">

</head>

<body id="theme-body">

<div class="container">

    <h1>🏆 LEADERBOARD</h1>

    <p class="subtitle">

        Top performers on CodeCrack AI

    </p>

    <table>

        <tr>

            <th>Rank</th>

            <th>User</th>

            <th>Problems Solved</th>

        </tr>

        <tr th:each="leader, stat : ${leaders}">

            <td>

                <span th:if="${stat.count==1}">
                    🥇
                </span>

                <span th:if="${stat.count==2}">
                    🥈
                </span>

                <span th:if="${stat.count==3}">
                    🥉
                </span>

                <span th:if="${stat.count>3}"
                      th:text="${stat.count}">
                </span>

            </td>

            <td th:text="${leader[0]}"></td>

            <td th:text="${leader[1]}"></td>

        </tr>

    </table>

</div>
<script th:src="@{/js/theme.js}">
</script>
</body>

</html>
