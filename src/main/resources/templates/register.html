<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | CodeCrack AI</title>
<link rel="stylesheet"
      th:href="@{/css/themes.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            background:
            radial-gradient(circle at top right,#112240,#050816 50%);
            position:relative;
        }

        /* STARS */

        body::before{
            content:"";
            position:absolute;
            width:100%;
            height:100%;
            background:
            radial-gradient(white 1px,transparent 1px);
            background-size:50px 50px;
            opacity:0.12;
        }

        /* MOON */

        .moon{
            position:absolute;
            top:80px;
            right:100px;
            width:180px;
            height:180px;
            border-radius:50%;
            background:
            radial-gradient(circle,#8cdcff,#1b3cff);
            box-shadow:
                    0 0 60px #00e1ff,
                    0 0 120px #3d5afe;
            opacity:.8;
        }

        /* CLOUDS */

        .cloud{
            position:absolute;
            background:rgba(50,100,255,.15);
            border-radius:100px;
            filter:blur(30px);
        }

        .cloud1{
            width:300px;
            height:150px;
            left:-80px;
            bottom:120px;
        }

        .cloud2{
            width:250px;
            height:120px;
            right:-50px;
            top:280px;
        }

        .cloud3{
            width:350px;
            height:160px;
            bottom:-30px;
            right:200px;
        }

        /* CARD */

        .container{
            position:relative;
            z-index:10;
            width:430px;
            padding:40px;
            border-radius:30px;

            background:rgba(12,20,45,.65);

            backdrop-filter:blur(18px);

            border:1px solid rgba(0,255,255,.25);

            box-shadow:
                    0 0 40px rgba(0,238,255,.2),
                    0 0 80px rgba(130,0,255,.2);

            text-align:center;
        }

        .logo{
            font-size:22px;
            color:#00eaff;
            margin-bottom:12px;
        }

        h1{
            font-size:58px;
            font-weight:900;

            background:
            linear-gradient(to right,#00f0ff,#7b5cff,#d946ef);

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;

            text-shadow:
                    0 0 20px rgba(0,255,255,0.5);

            margin-bottom:12px;
        }

        .subtitle{
            color:#b7c9ff;
            margin-bottom:35px;
            font-size:18px;
        }

        .input-box{
            margin-bottom:18px;
        }

        input{
            width:100%;
            padding:18px;

            border-radius:18px;
            border:1px solid rgba(0,255,255,.2);

            background:#0d1734;
            color:white;

            outline:none;
            font-size:16px;

            transition:.3s;
        }

        input:focus{
            border-color:#00f0ff;
            box-shadow:
                    0 0 20px rgba(0,240,255,.3);
        }

        input::placeholder{
            color:#92a4d5;
        }

        button{
            width:100%;
            border:none;
            border-radius:20px;

            padding:18px;
            margin-top:10px;

            font-size:22px;
            font-weight:bold;
            cursor:pointer;

            color:white;

            background:
            linear-gradient(
                    90deg,
                    #00e5ff,
                    #6c63ff,
                    #d946ef
            );

            transition:.4s;

            box-shadow:
                    0 0 25px rgba(0,255,255,.35);
        }

        button:hover{
            transform:translateY(-4px);

            box-shadow:
                    0 0 35px rgba(0,255,255,.7);
        }

        .login-link{
            margin-top:25px;
            color:#d5ddff;
        }

        .login-link a{
            color:#00eaff;
            text-decoration:none;
            font-weight:bold;
        }

    </style>
</head>
<body id="theme-body">

<div class="moon"></div>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<div class="container">

    <div class="logo">
        🚀 CodeCrack AI
    </div>

    <h1>REGISTER</h1>

    <p class="subtitle">
        Crack your dream interview
    </p>

    <form action="/register" method="post">

        <div class="input-box">
            <input
                    type="text"
                    name="username"
                    placeholder="Enter Username"
                    required>
        </div>

        <div class="input-box">
            <input
                    type="email"
                    name="email"
                    placeholder="Enter Email"
                    required>
        </div>

        <div class="input-box">
            <input
                    type="password"
                    name="password"
                    placeholder="Enter Password"
                    required>
        </div>

        <button type="submit">
            Register
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="/login">Login</a>
    </div>

</div>
<script th:src="@{/js/theme.js}">
</script>

</body>
</html>
