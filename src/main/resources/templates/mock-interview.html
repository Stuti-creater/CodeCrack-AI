<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        AI Mock Interview

    </title>

    <link rel="stylesheet"
          th:href="@{/css/mock.css}">
          <link rel="stylesheet"
      th:href="@{/css/themes.css}">

</head>

<body id="theme-body">
<div class="interview-card">
<form action="/mock-interview">

    <select name="company">

        <option value="google">
            Google
        </option>

        <option value="amazon">
            Amazon
        </option>

        <option value="meta">
            Meta
        </option>

        <option value="microsoft">
            Microsoft
        </option>

    </select>

    <button>
        Start Interview
    </button>

</form>
<h2>

Interview Company:

<span th:text="${company}">
</span>

</h2>

<h1>🤖 AI Mock Interview</h1>
<h3 id="progress">

    Question 1 / 3

</h3>

<h2 id="questionText">

    Tell me about yourself.

</h2>

<textarea
id="answerBox"
rows="10"
cols="60">
</textarea>

<br><br>

<button
type="button"

onclick="submitAnswer()">

    Submit Answer

</button>
<button
type="button"

id="showResultsBtn"

style="display:none;"

onclick="showResults()">

    Show Results

</button>

<div id="results">

</div>

<p id="result"></p>
<script th:inline="javascript">

let currentQuestion = 1;

let answers = [];



const company =

        /*[[${company}]]*/
        "google";

window.onload = function(){

    loadQuestion();

};

function loadQuestion(){

    fetch(

            "/generate-question"

            +

            "?company="

            +

            company

            +

            "&questionNumber="

            +

            currentQuestion,

            {

                method:"POST"

            }

    )

    .then(

            response => response.text()

    )

    .then(

            question => {

                document
                    .getElementById(
                            "questionText"
                    )
                    .innerText =

                            question;

            }

    );

}



function submitAnswer(){

    const answer =

        document
        .getElementById(
                "answerBox"
        )
        .value;

    if(answer.trim() === ""){

        alert(
                "Please enter an answer."
        );

        return;

    }

    answers.push(answer);

if(currentQuestion < 3){

    currentQuestion++;

    document
        .getElementById(
                "progress"
        )
        .innerText =

                "Question "

                +

                currentQuestion

                +

                " / 3";

    document
        .getElementById(
                "answerBox"
        )
        .value = "";

    loadQuestion();

}

else{

    document
        .getElementById(
                "progress"
        )
        .style.display =

                "none";

    document
        .getElementById(
                "questionText"
        )
        .innerText =

                "🎉 Interview Completed!";

    document
        .getElementById(
                "answerBox"
        )
        .style.display =

                "none";

    document
        .querySelector(
                "button[onclick='submitAnswer()']"
        )
        .style.display =

                "none";

    document
        .getElementById(
                "showResultsBtn"
        )
        .style.display =

                "inline-block";

}

}

function showResults(){

    document
        .getElementById(
                "results"
        )
        .innerHTML =

                "<p>🤖 AI is evaluating your interview...</p>";

    fetch(

            "/evaluate-interview",

            {

                method:"POST",

                headers:{

                    "Content-Type":"text/plain"

                },

                body:

                    answers.join(

                            "\n\n"

                    )

            }

    )

    .then(

            response => response.text()

    )

    .then(

            data => {

                document
                    .getElementById(
                            "results"
                    )
                    .innerHTML =

                            `
                            <div class="results-card">

                                <h2>

                                    🤖 AI Interview Feedback

                                </h2>

                                <pre>

${data}

                                </pre>

                            </div>
                            `;

            }

    )

    .catch(

            error => {

                document
                    .getElementById(
                            "results"
                    )
                    .innerHTML =

                            "<p>❌ Error evaluating interview.</p>";

            }

    );

}

</script>
</div>
<script th:src="@{/js/theme.js}">
</script>
</body>


</html>
