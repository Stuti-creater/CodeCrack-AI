<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
<link rel="stylesheet"
      th:href="@{/css/themes.css}">
    <title>CodeCrack AI</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#0a0f1f;
            color:white;
            height:100vh;
            overflow:hidden;
        }

        .container{
            display:flex;
            height:100vh;
        }

        /* LEFT PANEL */

        .left{
            width:50%;
            overflow-y:auto;
            padding:35px;
            border-right:1px solid #1e293b;
            background:#0f172a;
        }

        h1{
            font-size:40px;
            margin-bottom:20px;
            color:#60a5fa;
        }

        .meta{
            display:flex;
            gap:12px;
            margin-bottom:30px;
            flex-wrap:wrap;
        }

        .tag{
            padding:10px 18px;
            border-radius:30px;
            font-size:14px;
            font-weight:bold;
        }

        .easy{
            background:#14532d;
            color:#4ade80;
        }

        .medium{
            background:#78350f;
            color:#fb923c;
        }

        .hard{
            background:#7f1d1d;
            color:#f87171;
        }

        .company{
            background:#1e3a8a;
            color:#93c5fd;
        }

        .topic{
            background:#312e81;
            color:#c4b5fd;
        }

        .section{
            margin-top:30px;
        }

        .section h3{
            margin-bottom:15px;
            color:#93c5fd;
            font-size:24px;
        }

        .card{
            background:#111827;
            border:1px solid rgba(255,255,255,.08);
            border-radius:18px;
            padding:22px;
            line-height:1.7;
        }

        pre{
            white-space:pre-wrap;
            color:#d1d5db;
        }

        /* RIGHT PANEL */

        .right{
            width:50%;
            background:#020617;
            padding:30px;
            display:flex;
            flex-direction:column;
        }

        .editor-top{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .editor-title{
            font-size:22px;
            font-weight:bold;
            color:#60a5fa;
        }

        select{
            background:#111827;
            color:white;
            border:1px solid #334155;
            padding:12px 18px;
            border-radius:14px;
            font-size:15px;
        }

        textarea{
            width:100%;
            flex:1;
            resize:none;
            background:#0f172a;
            color:#60a5fa;
            border:1px solid #334155;
            border-radius:20px;
            padding:25px;
            font-size:16px;
            line-height:1.7;
        }

        .buttons{
            margin-top:20px;
            display:flex;
            gap:15px;
        }

        button{
            border:none;
            padding:14px 24px;
            border-radius:14px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
            transition:.3s;
        }

        .run{
            background:#2563eb;
            color:white;
        }

        .submit{
            background:#10b981;
            color:white;
        }

        .hint{
            background:#7c3aed;
            color:white;
        }

        button:hover{
            transform:translateY(-2px);
        }

        .output{
            margin-top:25px;
            background:#111827;
            border-radius:18px;
            padding:20px;
            border:1px solid rgba(255,255,255,.08);
        }

        .output h3{
            color:#93c5fd;
            margin-bottom:10px;
        }

        .output p{
            color:#94a3b8;
        }

    </style>
</head>
<script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>
<script>

let editor;

require.config({
    paths:{
        vs:"https://unpkg.com/monaco-editor@0.44.0/min/vs"
    }
});

require(
    ["vs/editor/editor.main"],
    function(){

        editor =
    monaco.editor.create(
        document.getElementById("editor"),
        {
            value:
                document.getElementById(
                    "starterCode"
                ).value,

            language:"java",
            theme:"vs-dark",
            automaticLayout:true
        }
    );
    const starterCode =
    document.getElementById(
        "starterCode"
    ).value;

editor.setValue(
    starterCode
);
    }
)

</script>

<body id="theme-body">

<div class="container">

    <!-- LEFT SIDE -->

    <div class="left">

        <h1 th:text="${questionName}">
            Question Name
        </h1>

        <!-- NEW -->
         <input type="hidden"
       id="starterCode"
       th:value="${starterCode}">
        <input type="hidden"
               id="questionName"
               th:value="${questionName}">
               <input type="hidden"
       id="hintText"
       th:value="${hint}">

        <div class="meta">

            <span class="tag medium"
                  th:text="${difficulty}">
            </span>

            <span class="tag company"
                  th:text="${company}">
            </span>

            <span class="tag topic">
                DSA
            </span>

        </div>

        <div class="section">

            <h3>Problem Statement</h3>

            <div class="card">
                <p th:text="${description}">
                </p>
            </div>

        </div>

        <div class="section">

            <h3>Example</h3>

            <div class="card">
                <pre th:text="${example}">
                </pre>
            </div>

        </div>

        <div class="section">

            <h3>Constraints</h3>

            <div class="card">
                <p>
                    1 ≤ n ≤ 10⁵
                </p>
            </div>

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="right">

        <div class="editor-top">

            <div class="editor-title">
                Code Editor
            </div>

            <select>
                <option>Java</option>
                <option>Python</option>
                <option>C++</option>
            </select>

        </div>
<div id="editor"
     style="height:650px;
            border:1px solid #334155;
            border-radius:20px;">
</div>

        <div class="buttons">
            <button onclick="judgeCode()">
    Judge
</button>

            
            <button class="run"
        onclick="runCode()">
          Run Code
         </button>
            

            <!-- CHANGED -->
            <button class="submit"
                    onclick="submitQuestion()">
                Submit
            </button>
            <button onclick="reviewCode()">
    AI Review
</button>

            <button class="hint"
        onclick="showHint()">
    Hint
</button>
        </div>
<div class="output"
     th:if="${needsInput}">

    <h3>Custom Input</h3>

    <textarea id="customInput"
              style="height:100px;">
    </textarea>

</div>

<div class="output">

    <h3>Output</h3>

    <p>
        Waiting for submission...
    </p>

</div>
    </div>

</div>
<script>

function submitQuestion(){

    const questionName =
        document.getElementById("questionName").value;

    fetch(
    "/submitQuestion?username=stuti&questionName="
    + encodeURIComponent(questionName)
)
.then(response => response.text())

.then(data => {

    const output =
        document.querySelector(".output p");

    if(data === "Accepted"){

        output.style.color="#22c55e";
        output.innerHTML="✅ Accepted";

    }
    else if(data === "Wrong Answer"){

        output.style.color="#ef4444";
        output.innerHTML="❌ Wrong Answer";

    }
    else{

        output.innerHTML=data;

    }

})
.catch(error=>{

    console.log(error);

});

}

function showHint(){

    const hint =
        document.getElementById("hintText").value;

    document.querySelector(".output p")
        .innerText =
        "💡 Hint: " + hint;
}
function runCode(){
    alert("Run clicked");

    const code =
        editor.getValue();

   const inputBox =
    document.getElementById("customInput");

    const questionTitle =
    document.getElementById("questionName").value;


fetch("/run",{

    method:"POST",

    headers:{
        "Content-Type":"application/json"
    },

    body:JSON.stringify({

        code: editor.getValue(),

        input: inputBox ? inputBox.value : "",

        questionTitle: questionTitle

    })

})
.then(response => response.text())
.then(data => {

    document.querySelector(".output p").innerText = data;

});
    
}
function judgeCode(){

    fetch("/judge",{
        method:"POST"
    })
    .then(response => response.text())
    .then(data => {

        const output =
            document.querySelector(".output p");

        if(data === "Accepted"){

            output.style.color = "#22c55e";
            output.innerText =
                "✅ Accepted";

        }
        else{

            output.style.color = "#ef4444";
            output.innerText =
                "❌ Wrong Answer";

        }

    });

}
function reviewCode(){

    const code =
            editor.getValue();

    fetch("/review",{
        method:"POST",
        headers:{
            "Content-Type":"text/plain"
        },
        body:code
    })
    .then(response => response.text())
    .then(data => {

        document.querySelector(
            ".output p"
        ).innerText = data;

    });

}

</script>
<script th:src="@{/js/theme.js}">
</script>
</body>


</html>
